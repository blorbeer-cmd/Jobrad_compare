<!DOCTYPE html>
<html lang="de">
<body>
<div class="fxxl-product-listing">

  <!-- Standard product card with offer price -->
  <a data-product-id="cube-touring-625" href="https://www.fahrrad-xxl.de/cube-touring-hybrid-one-625" class="fxxl-element-artikel__link">
    <figure class="fxxl-element-artikel__image-container">
      <img src="https://cdn.fahrrad-xxl.de/images/cube-touring.jpg" alt="E-Bike - Cube Touring Hybrid ONE 625" class="fxxl-element-artikel__image" />
    </figure>
    <figcaption class="fxxl-element-artikel__caption">
      <div class="fxxl-element-artikel__brand">Cube</div>
      <div class="fxxl-element-artikel__title">Touring Hybrid ONE 625</div>
      <div class="fxxl-element-artikel__price--old">2.999,00 €</div>
      <div class="fxxl-element-artikel__price">2.799,00 €</div>
      <div class="fxxl-element-artikel__availability">Sofort verfügbar</div>
    </figcaption>
  </a>

  <!-- Product card without discount (only current price) -->
  <a data-product-id="trek-domane-sl5" href="https://www.fahrrad-xxl.de/trek-domane-sl-5" class="fxxl-element-artikel__link">
    <figure class="fxxl-element-artikel__image-container">
      <img src="https://cdn.fahrrad-xxl.de/images/trek-domane.jpg" alt="Trek Domane SL 5" class="fxxl-element-artikel__image" />
    </figure>
    <figcaption class="fxxl-element-artikel__caption">
      <div class="fxxl-element-artikel__brand">Trek</div>
      <div class="fxxl-element-artikel__title">Domane SL 5</div>
      <div class="fxxl-element-artikel__price">2.999,00 €</div>
      <div class="fxxl-element-artikel__delivery">2-3 Wochen Lieferzeit</div>
    </figcaption>
  </a>

  <!-- Product card with img alt fallback for name -->
  <a data-product-id="giant-explore-1" href="https://www.fahrrad-xxl.de/giant-explore-e-plus-1" class="fxxl-element-artikel__link">
    <figure class="fxxl-element-artikel__image-container">
      <img src="https://cdn.fahrrad-xxl.de/images/giant.jpg" alt="Giant Explore E+ 1 Pro GTS" class="fxxl-element-artikel__image" />
    </figure>
    <figcaption class="fxxl-element-artikel__caption">
      <div class="fxxl-element-artikel__brand">Giant</div>
      <div class="fxxl-element-artikel__title">Explore E+ 1 Pro GTS</div>
      <div class="fxxl-element-artikel__price">3.899,00 €</div>
      <div class="fxxl-element-artikel__availability">Auf Lager</div>
    </figcaption>
  </a>

  <!-- Card with missing price — should be skipped -->
  <a data-product-id="no-price" href="/no-price-bike" class="fxxl-element-artikel__link">
    <figcaption class="fxxl-element-artikel__caption">
      <div class="fxxl-element-artikel__brand">NoBrand</div>
      <div class="fxxl-element-artikel__title">Bike Without Price</div>
    </figcaption>
  </a>

  <!-- Card with missing name — should be skipped -->
  <a data-product-id="no-name" href="/no-name-bike" class="fxxl-element-artikel__link">
    <figcaption class="fxxl-element-artikel__caption">
      <div class="fxxl-element-artikel__price">999,00 €</div>
    </figcaption>
  </a>

</div>
</body>
</html>
