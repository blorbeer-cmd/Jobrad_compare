<!DOCTYPE html>
<html lang="de">
<body>
<div class="product-listing">

  <!-- Standard product card with offer price -->
  <div class="product-card" data-product="haibike-allmtn-6">
    <a href="/haibike-allmtn-6">
      <img data-src="https://www.bike-discount.de/images/haibike.jpg" alt="Haibike" />
    </a>
    <h3 class="product-card__title">Haibike AllMtn 6</h3>
    <span class="price-old">4.999,00 €</span>
    <span class="product-card__price">4.599,00 €</span>
    <span class="delivery-status">4-5 Werktage</span>
  </div>

  <!-- Product card, no discount, product--box selector -->
  <div class="product--box" data-product="specialized-diverge-e5">
    <a href="/specialized-diverge-e5">
      <img src="https://www.bike-discount.de/images/specialized.jpg" />
    </a>
    <span class="product-name">Specialized Diverge E5</span>
    <span class="price">1.499,00 €</span>
    <span class="availability">Sofort lieferbar</span>
  </div>

  <!-- productCard class variant -->
  <div class="productCard" data-product="merida-scultura-4000">
    <a href="/merida-scultura-4000">
      <img data-src="https://www.bike-discount.de/images/merida.jpg" />
    </a>
    <h3>
      <a href="/merida-scultura-4000">Merida Scultura 4000</a>
    </h3>
    <span class="product-price">1.999,00 €</span>
  </div>

  <!-- Missing price — skip -->
  <div class="product-card" data-product="no-price">
    <h3 class="product-card__title">Bike Without Price</h3>
  </div>

  <!-- Missing name — skip -->
  <div class="product-card" data-product="no-name">
    <span class="product-card__price">500,00 €</span>
  </div>

</div>
</body>
</html>
