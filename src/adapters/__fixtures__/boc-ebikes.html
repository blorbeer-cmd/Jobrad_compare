<!DOCTYPE html>
<html lang="de">
<body>
<div class="collection">

  <!-- Sale product with compare-at price -->
  <product-card handle="kettler-quadriga-town-country-p10" class="product-card product-card--blends bg-custom text-custom">
    <div class="product-card__badge-list">
      <on-sale-badge class="badge badge--on-sale">Spare 47%</on-sale-badge>
    </div>
    <div class="product-card__figure">
      <a href="/products/kettler-quadriga-town-country-p10">
        <img src="//boc24.de/cdn/shop/files/kettler-quadriga.jpg?width=800" alt="Kettler Quadriga" class="product-card__image product-card__image--primary aspect-short" width="1740" height="979" loading="lazy" />
      </a>
    </div>
    <div class="product-card__info">
      <div class="v-stack gap-0.5 w-full">
        <span class="product-card__title">
          <a href="/products/kettler-quadriga-town-country-p10" class="bold">Kettler QUADRIGA TOWN +COUNTRY P10</a>
        </span>
        <price-list class="price-list">
          <sale-price class="text-on-sale">
            <span class="sr-only">Angebot</span>€1.999,00<span> *</span>
          </sale-price>
          <compare-at-price class="text-subdued line-through">
            <span class="sr-only">Regulärer Preis</span>€3.799,00<span> *</span>
          </compare-at-price>
        </price-list>
      </div>
    </div>
  </product-card>

  <!-- Regular price product (no discount) -->
  <product-card handle="cube-kathmandu-hybrid-one-800" class="product-card product-card--blends bg-custom text-custom">
    <div class="product-card__figure">
      <a href="/products/cube-kathmandu-hybrid-one-800">
        <img src="//boc24.de/cdn/shop/files/cube-kathmandu.jpg?width=800" alt="Cube Kathmandu" class="product-card__image product-card__image--primary aspect-short" width="1740" height="979" loading="lazy" />
      </a>
    </div>
    <div class="product-card__info">
      <div class="v-stack gap-0.5 w-full">
        <span class="product-card__title">
          <a href="/products/cube-kathmandu-hybrid-one-800" class="bold">Cube Kathmandu Hybrid ONE 800 WA</a>
        </span>
        <price-list class="price-list">
          <sale-price class="text-subdued">
            <span class="sr-only">Angebot</span>€3.199,00<span> *</span>
          </sale-price>
        </price-list>
      </div>
    </div>
  </product-card>

  <!-- Third product -->
  <product-card handle="cube-kathmandu-hybrid-pro-800" class="product-card product-card--blends bg-custom text-custom">
    <div class="product-card__figure">
      <a href="/products/cube-kathmandu-hybrid-pro-800">
        <img src="//boc24.de/cdn/shop/files/cube-kathmandu-pro.jpg?width=800" alt="Cube Kathmandu Pro" class="product-card__image product-card__image--primary aspect-short" width="1740" height="979" loading="lazy" />
      </a>
    </div>
    <div class="product-card__info">
      <div class="v-stack gap-0.5 w-full">
        <span class="product-card__title">
          <a href="/products/cube-kathmandu-hybrid-pro-800" class="bold">Cube Kathmandu Hybrid Pro 800 WA</a>
        </span>
        <price-list class="price-list">
          <sale-price class="text-subdued">
            <span class="sr-only">Angebot</span>€3.599,00<span> *</span>
          </sale-price>
        </price-list>
      </div>
    </div>
  </product-card>

  <!-- Empty/broken card — should be skipped -->
  <product-card handle="" class="product-card">
  </product-card>

  <!-- Card without price — should be skipped -->
  <product-card handle="no-price-bike" class="product-card">
    <div class="product-card__info">
      <span class="product-card__title">
        <a href="/products/no-price" class="bold">Some Bike Without Price</a>
      </span>
    </div>
  </product-card>

</div>
</body>
</html>
