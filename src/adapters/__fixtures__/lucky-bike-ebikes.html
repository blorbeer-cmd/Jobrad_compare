<!DOCTYPE html>
<html lang="de">
<body>
<div class="listing-wrapper">

  <!-- Standard product box with offer price -->
  <div class="product--box" data-product-id="kalkhoff-endeavour-5b">
    <a href="/kalkhoff-endeavour-5b-move-plus" class="product--image">
      <img src="https://www.lucky-bike.de/images/kalkhoff.jpg" alt="Kalkhoff" />
    </a>
    <div class="product--info">
      <a href="/kalkhoff-endeavour-5b-move-plus" class="product--title">Kalkhoff Endeavour 5.B Move+</a>
      <span class="price--line-through">3.699,00 €</span>
      <span class="price--default">3.499,00 €</span>
      <div class="delivery--status-icon">Sofort verfügbar</div>
    </div>
  </div>

  <!-- Product box, no discount -->
  <div class="product-box" data-product-id="bergamont-revox-3">
    <a href="/bergamont-revox-3">
      <img data-src="https://www.lucky-bike.de/images/bergamont.jpg" />
    </a>
    <span class="product-name">
      <a href="/bergamont-revox-3">Bergamont Revox 3</a>
    </span>
    <span class="product--price">799,00 €</span>
    <span class="delivery-info">3-5 Werktage</span>
  </div>

  <!-- KTM with product-title selector -->
  <div class="product--box" data-product-id="ktm-macina-gran-710">
    <a href="/ktm-macina-gran-710">
      <img src="https://www.lucky-bike.de/images/ktm.jpg" />
    </a>
    <span class="product-title">
      <a href="/ktm-macina-gran-710">KTM Macina Gran 710</a>
    </span>
    <span class="product-price">3.299,00 €</span>
  </div>

  <!-- Missing price — skip -->
  <div class="product--box" data-product-id="no-price">
    <span class="product--title">Bike Without Price</span>
  </div>

</div>
</body>
</html>
