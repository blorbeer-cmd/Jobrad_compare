<!DOCTYPE html>
<html lang="de">
<body>
<div class="collection-product-list">
  <ul class="grid product-grid">

    <!-- Shopify product card — sale -->
    <li class="grid__item" data-product-id="SMPL-001">

        <a href="/products/kalkhoff-image-5b-advance-e-bike-2025" class="full-unstyled-link">

        <div class="card__content">

        <div class="card__content">
          <div class="card__information">

            <h3 class="card__heading">

      <div class="card-wrapper">
