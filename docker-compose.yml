services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: jobrad
      POSTGRES_PASSWORD: jobrad_secret
      POSTGRES_DB: jobrad_compare
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobrad -d jobrad_compare"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://jobrad:jobrad_secret@db:5432/jobrad_compare?schema=public
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
      EMAIL_SERVER_HOST: ${EMAIL_SERVER_HOST:-smtp.example.com}
      EMAIL_SERVER_PORT: ${EMAIL_SERVER_PORT:-587}
      EMAIL_SERVER_USER: ${EMAIL_SERVER_USER:-user}
      EMAIL_SERVER_PASSWORD: ${EMAIL_SERVER_PASSWORD:-password}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@example.com}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      USE_DEMO_ADAPTERS: ${USE_DEMO_ADAPTERS:-true}
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy && node server.js"

volumes:
  postgres_data:
