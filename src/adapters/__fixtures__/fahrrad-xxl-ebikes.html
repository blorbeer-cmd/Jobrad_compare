<!DOCTYPE html>
<html lang="de">
<body>
<div class="product-listing">

  <!-- Standard product card with offer price -->
  <div class="product-card" data-product-id="cube-touring-625">
    <a href="/cube-touring-hybrid-one-625">
      <img src="https://www.fahrrad-xxl.de/images/cube-touring.jpg" alt="Cube Touring" />
    </a>
    <h3 class="product-title">
      <a href="/cube-touring-hybrid-one-625">Cube Touring Hybrid ONE 625</a>
    </h3>
    <span class="price-old">2.999,00 €</span>
    <span class="current-price">2.799,00 €</span>
    <span class="availability">Sofort verfügbar</span>
  </div>

  <!-- Product card without discount (only current price) -->
  <div class="product-card" data-product-id="trek-domane-sl5">
    <a href="/trek-domane-sl-5">
      <img data-src="https://www.fahrrad-xxl.de/images/trek-domane.jpg" alt="Trek Domane" />
    </a>
    <h3><a class="product-name" href="/trek-domane-sl-5">Trek Domane SL 5</a></h3>
    <span class="price">2.999,00 €</span>
    <span class="delivery-info">2-3 Wochen Lieferzeit</span>
  </div>

  <!-- Product card with data-src image -->
  <div class="product-item">
    <a href="/giant-explore-e-plus-1">
      <img data-src="https://www.fahrrad-xxl.de/images/giant.jpg" />
    </a>
    <h2><a href="/giant-explore-e-plus-1">Giant Explore E+ 1 Pro GTS</a></h2>
    <span class="product-price">3.899,00 €</span>
    <span class="stock-info">Auf Lager</span>
  </div>

  <!-- Card with missing price — should be skipped -->
  <div class="product-card" data-product-id="no-price">
    <h3 class="product-title">Bike Without Price</h3>
    <span class="availability">verfügbar</span>
  </div>

  <!-- Card with missing name — should be skipped -->
  <div class="product-card" data-product-id="no-name">
    <span class="current-price">999,00 €</span>
  </div>

</div>
</body>
</html>
