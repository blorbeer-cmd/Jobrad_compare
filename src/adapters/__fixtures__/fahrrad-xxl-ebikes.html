<!DOCTYPE html>
<html lang="de">
<body>
<div class="fxxl-product-listing">

  <!-- Sale product card (matches real fahrrad-xxl.de structure) -->
  <a data-product-id="581912" href="https://www.fahrrad-xxl.de/carver-tour-e-410-m000009403" class="gtm__artikel--click fxxl-element-artikel__link">
    <figure class="fxxl-element-artikel__image-container">
      <div class="fxxl-element-artikel__variant-main-slider">
        <img width="560" height="373" src="https://cdn.fahrrad-xxl.de/images/carver-tour.jpg" alt="E-Bike-Pedelec - Carver Tour E.410 - 400 Wh - 28 Zoll - Diamant - 2026" class="fxxl-element-artikel__image fxxl-element-artikel__image--main" loading="lazy" />
      </div>
      <figcaption class="fxxl-element-artikel__caption">
        <div class="fxxl-element-artikel__brand-rating">
          <div class="fxxl-element-artikel__brand">Carver</div>
        </div>
        <div class="fxxl-element-artikel__title"> Tour E.410 - 400 Wh - 28 Zoll - Diamant - 2026 </div>
      </figcaption>
    </figure>
    <div class="fxxl-element-artikel__price-content" data-variant="581912-581912">
      <div class="fxxl-element-artikel__price fxxl-element-artikel__price--new fxxl-price-with-strike-price"> 1.799,99 € </div>
      <div class="fxxl-element-artikel__price fxxl-element-artikel__price--old">
        <span class="fxxl-strike-price"> 2.699,99 € </span>
        <span class="fxxl-strike-price fxxl-strike-price-note"> ¹ </span>
      </div>
      <div class="fxxl-element-artikel__price fxxl-element-artikel__price--discount fxxl-discount"> -33% </div>
    </div>
  </a>

  <!-- Non-sale product card (regular price, no --new/--old) -->
  <a data-product-id="590123" href="https://www.fahrrad-xxl.de/trek-domane-sl-5" class="gtm__artikel--click fxxl-element-artikel__link">
    <figure class="fxxl-element-artikel__image-container">
      <div class="fxxl-element-artikel__variant-main-slider">
        <img width="560" height="373" src="https://cdn.fahrrad-xxl.de/images/trek-domane.jpg" alt="Rennrad - Trek Domane SL 5 - 2026" class="fxxl-element-artikel__image fxxl-element-artikel__image--main" loading="lazy" />
      </div>
      <figcaption class="fxxl-element-artikel__caption">
        <div class="fxxl-element-artikel__brand-rating">
          <div class="fxxl-element-artikel__brand">Trek</div>
        </div>
        <div class="fxxl-element-artikel__title"> Domane SL 5 - 2026 </div>
      </figcaption>
    </figure>
    <div class="fxxl-element-artikel__price-content" data-variant="590123-590123">
      <div class="fxxl-element-artikel__price"> 2.999,00 € </div>
    </div>
  </a>

  <!-- Sale product with strike-price -->
  <a data-product-id="580456" href="https://www.fahrrad-xxl.de/giant-explore-e-plus-1" class="gtm__artikel--click fxxl-element-artikel__link">
    <figure class="fxxl-element-artikel__image-container">
      <div class="fxxl-element-artikel__variant-main-slider">
        <img width="560" height="373" src="https://cdn.fahrrad-xxl.de/images/giant.jpg" alt="Giant Explore E+ 1 Pro GTS" class="fxxl-element-artikel__image fxxl-element-artikel__image--main" loading="lazy" />
      </div>
      <figcaption class="fxxl-element-artikel__caption">
        <div class="fxxl-element-artikel__brand-rating">
          <div class="fxxl-element-artikel__brand">Giant</div>
        </div>
        <div class="fxxl-element-artikel__title"> Explore E+ 1 Pro GTS </div>
      </figcaption>
    </figure>
    <div class="fxxl-element-artikel__price-content" data-variant="580456-580456">
      <div class="fxxl-element-artikel__price fxxl-element-artikel__price--new fxxl-price-with-strike-price"> 3.499,00 € </div>
      <div class="fxxl-element-artikel__price fxxl-element-artikel__price--old">
        <span class="fxxl-strike-price"> 3.899,00 € </span>
      </div>
    </div>
  </a>

  <!-- Card with missing price — should be skipped -->
  <a data-product-id="no-price" href="/no-price-bike" class="fxxl-element-artikel__link">
    <figcaption class="fxxl-element-artikel__caption">
      <div class="fxxl-element-artikel__brand">NoBrand</div>
      <div class="fxxl-element-artikel__title">Bike Without Price</div>
    </figcaption>
  </a>

</div>
</body>
</html>
