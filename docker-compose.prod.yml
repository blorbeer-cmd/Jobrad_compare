# docker-compose.prod.yml
# Production override - use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  app:
    restart: always
    environment:
      NODE_ENV: production
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  db:
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
